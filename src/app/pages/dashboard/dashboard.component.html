<div class="dashboard-container">

  <div class="welcome-card">
    <h1>🌟 Welcome to AstraFlow</h1>
    <p class="subtitle">Your cosmic journey begins here</p>
    <div class="user-info">
      <span>✉️ {{ userEmail }}</span>
      <span>🆔 User ID: {{ userId }}</span>
    </div>
  </div>

  <div class="features-grid">

    <div class="feature-card">
      <div class="icon">♈</div>
      <h3>Birth Chart</h3>
      <p>Calculate your planetary positions</p>

    </div>

    <div class="feature-card">
      <div class="icon">🔮</div>
      <h3>Daily Forecast</h3>
      <p>See what the stars say today</p>
      <button class="btn-primary">View Forecast</button>
    </div>

    <div class="feature-card">
      <div class="icon">💫</div>
      <h3>Compatibility</h3>
      <p>Check your cosmic compatibility</p>
      <button class="btn-primary">Check Now</button>
    </div>

  </div>
