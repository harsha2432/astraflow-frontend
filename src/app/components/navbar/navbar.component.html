<mat-toolbar color="primary">

  <span style="font-size: 20px; font-weight: bold; cursor: pointer;"
        (click)="goTo('dashboard')">
    ✨ AstraFlow
  </span>

  <span style="flex: 1;"></span>

  <button mat-button (click)="goTo('dashboard')">
    🏠 Dashboard
  </button>

  <button mat-button (click)="goTo('chart')">
    🪐 My Chart
  </button>

  <button mat-button (click)="goTo('forecast')">
    🌅 Daily Forecast
  </button>

  <button mat-raised-button
          (click)="goTo('login')"
          style="margin-left: 8px;">
    Login
  </button>

</mat-toolbar>
